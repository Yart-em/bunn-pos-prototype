<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BUNN POS</title>
<style>
  @font-face {
    font-family: 'Engravers Gothic';
    src: url('EngraversGothic-Bold.woff2') format('woff2');
    font-weight: 700; font-style: normal;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }

  html, body {
    width:100%; max-width:100%;
    height:100%; overflow:hidden;
    font-family:'Engravers Gothic',sans-serif;
    background:#fff;
    touch-action:manipulation;
  }

  /* Full-screen container — height:100vh is set explicitly so it never relies
     on the parent-chain (100% on html→body→pos). This fixes Android Chrome
     where dvh is unsupported and the height chain can collapse. */
  .pos {
    width:100%; height:100vh;
    max-width:600px; margin:0 auto;
    display:flex; flex-direction:column;
    overflow:hidden;
    background:#fff;
    position:relative;
  }

  /* ── Screen management — explicit sides instead of inset shorthand ── */
  .screen {
    position:absolute; top:0; right:0; bottom:0; left:0;
    display:flex; flex-direction:column;
    background:#fff;
  }
  .screen.hidden { display:none; }

  /* ── Screen 2: Waiting for payment ── */
  /*
    Logo: same calculation as screen 1.
    Screen-1 logo top = 6.3% of top-zone height = 6.3% × (pos_width × 334/402) = pos_width × 5.22%
    Since pos_width ≈ 100vw on phones: top ≈ 5.22vw  (same as screen 1 at any phone width)
  */
  /*
    Logo top: screen-1 positions it at 6.3% of top-zone height = 6.3% × (pos_width × 334/402).
    At 402px: 21px. At 375px: 19.6px. At 414px: 21.6px.
    Using 21px covers the full phone size range accurately.
  */
  .s2-logo {
    position:absolute;
    left:50%; top:21px;
    transform:translateX(-50%);
    width:24.9%; z-index:2;
  }
  .s2-logo svg { display:block; width:100%; height:auto; }

  /*
    Card: Figma Y=53 top, Y=779 bottom (874-779=95px), user says bottom=50px.
    left=12/402=2.99%, right=(402-389)/402=3.23%
  */
  .wait-card {
    position:absolute;
    top:53px; bottom:10px;
    left:2.99%; right:3.23%;
    background:#FFC803;
    /* border-radius handled by JS clip-path (includes notch at top-right) */
    overflow:hidden;
    display:flex; flex-direction:column;
  }

  /* Notch: white ring around X button achieved via box-shadow — more reliable than overlay div */

  /* Text section at top of card */
  .wait-top {
    flex-shrink:0;
    padding:9% 8% 3%;
    text-align:center;
  }
  .checking-lbl {
    font-weight:700;
    font-size:clamp(10px,3.7vw,18px);
    letter-spacing:.12em;
    color:rgba(0,0,0,.65);
    margin-bottom:3%;
  }
  .wait-amount {
    font-weight:700;
    font-size:clamp(26px,11.5vw,56px);
    color:rgba(0,0,0,.85);
    letter-spacing:.03em;
    line-height:1.1;
  }
  .wait-via {
    font-weight:700;
    font-size:clamp(20px,9.5vw,46px);
    color:rgba(0,0,0,.85);
    letter-spacing:.12em;
    line-height:1.2;
    margin-top:1%;
  }

  /* Video: fills remaining space between text and footer.
     object-position: center bottom shows the coin wave sweep at the bottom of the clip. */
  .wait-vid-wrap {
    flex:1;
    min-height:0;
    position:relative;
    overflow:hidden;
  }
  .coins-vid, .coins-canvas {
    position:absolute;
    top:0; right:0; bottom:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    object-position:center bottom;
  }

  /* Footer: swap icon + instruction text — always stays below video, has bottom breathing room */
  .wait-footer {
    flex-shrink:0;
    padding:4% 10% 8%;
    display:flex; flex-direction:column;
    align-items:center; gap:6px;
    text-align:center;
  }
  .wait-footer svg { width:28px; height:24px; opacity:.7; }
  .wait-hint {
    font-family:system-ui,-apple-system,sans-serif;
    font-weight:400;
    font-size:clamp(11px,3.4vw,17px);
    color:rgba(0,0,0,.65);
    line-height:1.45;
  }

  /* Screen 3: two-line label (kept for legacy, now unused) */
  .s3-lbl { font-size:clamp(9px,3.1vw,15px); line-height:1.45; }

  /* ── Screen 3: Pay Please (842-183) ── */
  /* Card: top=53px, height ~49% of viewport (Figma: 427/874 = 48.9%) */
  .pay-card {
    position:absolute;
    top:53px; left:2.99%; right:3.23%;
    height:49vh;
    background:#FFC803;
    /* clip-path set by JS (same S-curve notch as s2) */
    overflow:visible; /* NFC button extends below card edge */
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:2%;
    padding:10% 10% 16%;
    text-align:center;
  }
  .pay-lbl {
    font-weight:700;
    font-size:clamp(10px,3.7vw,18px);
    letter-spacing:.12em;
    color:rgba(0,0,0,.65);
  }
  .pay-amount {
    font-weight:700;
    font-size:clamp(28px,13vw,62px);
    color:rgba(0,0,0,.85);
    letter-spacing:.02em; line-height:1.1;
  }
  .pay-usdc {
    font-weight:700;
    font-size:clamp(18px,8.5vw,42px);
    color:rgba(0,0,0,.75);
    letter-spacing:.08em; line-height:1.2;
  }

  /* NFC tap button — bottom-left of card, half-overlapping the edge */
  .nfc-btn {
    position:absolute;
    top:calc(53px + 49vh - 32px); /* card bottom minus half-button */
    left:calc(2.99% + 18px);
    width:clamp(54px,15vw,72px); aspect-ratio:1;
    border-radius:50%;
    background:#272727;
    border:none; outline:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,.2), 0 12px 28px rgba(0,0,0,.18);
    z-index:5;
  }
  .nfc-btn svg { width:52%; height:52%; }

  /* Below-card area: instruction text */
  .pay-below {
    position:absolute;
    top:calc(53px + 49vh + 14px);
    left:0; right:0;
    padding:0 8%;
    pointer-events:none;
    z-index:4;
  }
  .pay-instruction {
    font-family:system-ui,-apple-system,sans-serif;
    font-weight:400;
    font-size:clamp(11px,3.4vw,16px);
    color:rgba(0,0,0,.5);
    line-height:1.45;
    max-width:52%; /* leave room for bunny on right */
  }

  /* Bunny — right side, partially overflowing card's right edge, Figma: 100% opacity, rotated 35.96° */
  .bunny-img {
    position:absolute;
    top:calc(53px + 34vh);
    right:-14%;
    width:73%;
    transform:rotate(35.96deg);
    transform-origin:center center;
    pointer-events:none;
    z-index:3;
  }

  /* Tap illustration — below card, Figma: 60% image opacity, rotated -12.48° */
  .tap-img {
    position:absolute;
    top:calc(53px + 49vh + 14px);
    left:-8%;
    width:108%;
    opacity:0.6;
    transform:rotate(-12.48deg);
    transform-origin:center top;
    pointer-events:none;
    z-index:2;
  }

  /* X close button — outside card div so it isn't clipped by overflow:hidden.
     Notch is cut into the card via JS clip-path: path() — matches Figma Boolean Subtract. */
  .wait-close {
    position:absolute;
    top:53px; right:3.23%;
    width:clamp(44px,14.7%,68px); aspect-ratio:1;
    border-radius:50%;
    background:#272727;
    border:none; outline:none; cursor:pointer;
    z-index:10;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,.12), 0 16px 32px rgba(0,0,0,.15);
    transition:transform .1s,box-shadow .1s;
  }
  .wait-close:active { transform:scale(.92); box-shadow:0 2px 4px rgba(0,0,0,.15); }
  .wait-close svg { width:45%; height:45%; }

  /*
    Top zone: Figma 402×334 coordinate space.
    aspect-ratio creates a REAL height so absolute children's top/left %
    values resolve correctly (padding-bottom trick gives height=0 for % calc).
    height = width × 334/402 = 83.08% of width.
  */
  .top-zone {
    position:relative;
    flex-shrink:0;
    aspect-ratio: 402 / 334;
    overflow:visible;
  }

  /*
    Card shape: in Figma at x=15–390, y=52–334 within 402×334 frame.
    left  = 15/402  = 3.73%  of top-zone width
    right = 12/402  = 2.99%  of top-zone width
    top   = 52/334  = 15.57% of top-zone HEIGHT (= 52/402 of width in absolute px)
    width = 375/402 = 93.28% of top-zone width  → height auto fills to bottom
  */
  .card-shape {
    position:absolute;
    left:3.73%; right:2.99%;
    top:15.57%; /* % of containing-block height */
    width:93.28%; height:auto;
    display:block;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.06)) drop-shadow(0 16px 32px rgba(0,0,0,.10));
  }

  /*
    BUNN logo: Figma x=150, y=21, w=100, h=16  (in 402×334 frame).
    Center x = (150+50)/402 = 200/402 = 49.8% → use left:50% + translateX(-50%) to truly center.
    top  = 21/334 = 6.3%   of top-zone height
    width= 100/402 = 24.9% of top-zone width
  */
  .logo {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:6.3%;
    width:24.9%;
    z-index:2;
  }
  .logo svg { display:block; width:100%; height:auto; }

  /*
    Nav buttons: Figma circles cx/cy/r in 402×334 frame:
      History:  cx=232.5  cy=80.5  r=29.5  → top-edge y=51
      Settings: cx=295.5  cy=81.5  r=29.5  → top-edge y=52
      Close:    cx=359.5  cy=81.5  r=29.5  → right-edge x=389
    Group:
      right = (402−389)/402 = 3.2%  (Close button right edge)
      top   = 51/334        = 15.3% (History button top edge)
      width = (389−203)/402 = 46.3% (History left to Close right)
  */
  .nav-btns {
    position:absolute;
    right:3.2%;
    top:15.3%;
    width:46.3%;
    display:flex;
    gap:2.2%;
    z-index:2;
  }

  .icon-btn {
    flex:1; aspect-ratio:1;
    border-radius:50%; background:#272727;
    border:none; outline:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 4px rgba(0,0,0,.08),0 16px 32px rgba(0,0,0,.12);
    transition:transform .1s,box-shadow .1s;
  }
  .icon-btn:active { transform:scale(.92); box-shadow:0 2px 4px rgba(0,0,0,.15); }
  .icon-btn svg { width:55%; height:55%; }

  /*
    Card body (SUM / amount / AED): below notch.
    Notch bottom in Figma: y=116 → top = 116/334 = 34.73% of top-zone height
    left/right same as card-shape.
  */
  .card-body {
    position:absolute;
    left:3.73%; right:2.99%;
    top:34.73%; bottom:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    padding-left:12%; padding-right:12%;
    padding-top:9%; padding-bottom:8%;
  }

  /* Amount + AED float together, centered in the remaining space below SUM label */
  .amount-group {
    flex:1; width:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:2%;
    overflow:hidden;
  }

  .sum-label {
    font-weight:700;
    /* Figma: cap-height 13px in 402px frame → font ~18px → 18/402 = 4.48vw */
    font-size:clamp(14px, 4.48vw, 22px);
    color:#272727; letter-spacing:.1em; text-align:center;
    margin-bottom:3%;
  }

  .amount-wrap {
    width:100%; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    padding:1% 0;
  }

  #amt {
    font-weight:700;
    font-size:clamp(28px, min(15vw, 11dvh), 70px);
    color:rgba(0,0,0,.8);
    letter-spacing:.02em;
    white-space:nowrap; line-height:1.1; text-align:center;
  }

  .cur {
    display:inline-block; width:clamp(12px,4vw,22px); height:3px;
    background:rgba(0,0,0,.8); vertical-align:middle; margin-bottom:3px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .currency {
    font-weight:700; font-size:clamp(28px, min(15vw, 11dvh), 70px);
    color:rgba(0,0,0,.8); letter-spacing:.1em; text-align:center;
  }

  /* Numpad: takes remaining height */
  .pad {
    flex:1; min-height:0;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:clamp(5px,2vw,9px);
    padding:clamp(4px,2vw,8px) 3.73% clamp(8px,3vw,14px);
  }
  .k {
    border-radius:20px; background:#272727;
    border:none; outline:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 4px rgba(0,0,0,.08),0 16px 32px rgba(0,0,0,.12);
    transition:transform .1s,box-shadow .1s,background .1s;
  }
  /* Number & backspace: press → yellow (#FFC803) — use JS class, :active unreliable after preventDefault */
  .k.pressed { transform:scale(.93); box-shadow:0 2px 4px rgba(0,0,0,.15); background:#FFC803; }
  .k span {
    font-family:'Engravers Gothic',sans-serif; font-weight:700;
    font-size:clamp(20px,7vw,36px); color:#fff;
    letter-spacing:.02em; pointer-events:none;
  }
  /* When yellow bg on press, make text dark */
  .k.pressed span { color:#272727; }
  .k svg { pointer-events:none; }
  /* Arrow button: press → black */
  .k.pink { background:#FF9BAC; }
  .k.pink.pressed { background:#272727; }
  .k.pink svg { width:36%; height:36%; }
  /* Arrow icon turns white on black bg */
  .k.pink svg path { transition:fill .1s; }
  .k.pink.pressed svg path { fill:#FF9BAC; }
  .k.bksp svg { width:30%; height:30%; }
  /* Backspace icon turns dark on yellow bg */
  .k.bksp.pressed svg path { fill:#272727; }
</style>
</head>

<div class="pos">

<!-- ══ Screen 1: Amount entry ══ -->
<div class="screen" id="s1">

  <!-- ── Top zone: Figma 402×334 proportional layout ── -->
  <div class="top-zone">

    </svg>

    <!-- BUNN logo — exact Figma vector, viewBox references original coords -->
    <div class="logo">

      </svg>
    </div>

    <!-- Nav buttons: positioned in the notch area (top-right white space) -->
    <div class="nav-btns">

<script>
  let digits = '';
  const MAX_LEFT = 9;
  const el = document.getElementById('amt');
  const currencyEl = document.querySelector('.currency');

  function render() {
    if (!digits.length) {
      el.innerHTML = '.<span class="cur"></span>';
      el.style.fontSize = '';
      currencyEl.style.fontSize = '';
      return;
    }
    const p = digits.padStart(3, '0');
    const r = p.slice(-2);
    let l = p.slice(0, -2).replace(/^0+/, '');
    el.textContent = (l || '') + '.' + r;
    if (!l) el.textContent = '.' + r;
    const max = el.parentElement.clientWidth;
    el.style.fontSize = '';
    let s = Math.round(parseFloat(getComputedStyle(el).fontSize));
    el.style.fontSize = s + 'px';
    while (el.scrollWidth > max && s > 22) { s -= 2; el.style.fontSize = s + 'px'; }
    currencyEl.style.fontSize = el.style.fontSize;
  }

  const s1     = document.getElementById('s1');
  const s2     = document.getElementById('s2');
  const s3     = document.getElementById('s3');
  const waitAmt = document.getElementById('wait-amt');
  const payAmt     = document.getElementById('pay-amt');
  let usdcRate  = 3.67;   // fallback: 3.67 AED = 1 USDC

  /* ── Generic S-curve notch clip-path (matches Figma Boolean Subtract) ── */
  function applyCardNotch(card, btn) {
    if (!card || !btn) return;
    const W = card.offsetWidth, H = card.offsetHeight;
    if (!W || !H) return;
    const nr = btn.offsetWidth / 2, sr = nr + 3, cr = 35, k = 0.5523;
    const p = [
      `M${cr} 0`, `H${W-3*sr}`,
      `C${W-3*sr+k*sr} 0 ${W-2*sr} ${sr*(1-k)} ${W-2*sr} ${sr}`,
      `C${W-2*sr} ${sr*(1+k)} ${W-sr*(1+k)} ${2*sr} ${W-sr} ${2*sr}`,
      `C${W-sr*(1-k)} ${2*sr} ${W} ${sr*(3-k)} ${W} ${3*sr}`,
      `V${H-cr}`, `A${cr} ${cr} 0 0 1 ${W-cr} ${H}`,
      `H${cr}`,   `A${cr} ${cr} 0 0 1 0 ${H-cr}`,
      `V${cr}`,   `A${cr} ${cr} 0 0 1 ${cr} 0Z`
    ].join(' ');
    card.style.clipPath = `path('${p}')`;
  }
  function updateWaitCardShape() {
    applyCardNotch(document.querySelector('#s2 .wait-card'), document.getElementById('wait-close'));
  }
  function updateS3CardShape() {
    applyCardNotch(document.getElementById('pay-card'), document.getElementById('s3-close'));
  }

  /* ── Rate fetching: Coinbase public API, fallback 3.67 ── */
  async function fetchRate() {
    try {
      const res = await fetch(
        'https://api.coinbase.com/v2/exchange-rates?currency=USDC',
        { signal: AbortSignal.timeout(4000) }
      );
      const d = await res.json();
      const r = parseFloat(d?.data?.rates?.AED);
      if (r > 0) usdcRate = r;
    } catch(e) { /* keep hardcoded fallback */ }
  }

  /* ── Screen transitions ── */
  async function showScreen2() {
    const p   = digits.padStart(3, '0');
    const aed = (p.slice(0, -2).replace(/^0+/, '') || '0') + '.' + p.slice(-2);
    waitAmt.textContent = aed + ' AED';
    s1.classList.add('hidden');
    s2.classList.remove('hidden');
    updateWaitCardShape();

    // Race: 1-second minimum display + rate fetch in parallel
    const t0 = Date.now();
    await fetchRate();
    const remaining = Math.max(0, 1000 - (Date.now() - t0));
    setTimeout(() => showScreen3(aed), remaining);
  }

  function showScreen3(aed) {
    payAmt.textContent = aed + ' AED';
    s2.classList.add('hidden');
    s3.classList.remove('hidden');
    updateS3CardShape();
  }

  function showScreen1() {
    s2.classList.add('hidden');
    s3.classList.add('hidden');
    s1.classList.remove('hidden');
  }

  document.getElementById('wait-close').addEventListener('pointerdown', e => {
    e.preventDefault(); showScreen1();
  });
  document.getElementById('s3-close').addEventListener('pointerdown', e => {
    e.preventDefault(); showScreen1();
  });

  /* ── Keypad ── */
  function press(k) {
    if (k === 'backspace') {
      digits = digits.slice(0, -1);
    } else if (k === 'submit') {
      if (digits.length && +digits > 0) showScreen2();
      return;
    } else {
      const n = digits + k;
      if (Math.max(0, n.length - 2) > MAX_LEFT) return;
      digits = n;
    }
    render();
  }

  document.querySelectorAll('[data-key]').forEach(b => {
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      b.classList.add('pressed');
      press(b.dataset.key);
    });
    b.addEventListener('pointerup',    () => b.classList.remove('pressed'));
    b.addEventListener('pointercancel',() => b.classList.remove('pressed'));
    b.addEventListener('pointerleave', () => b.classList.remove('pressed'));
  });
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') press(e.key);
    else if (e.key === 'Backspace') { e.preventDefault(); press('backspace'); }
    else if (e.key === 'Enter') press('submit');
    else if (e.key === 'Escape') showScreen1();
  });

  /* ── iOS canvas-based video (same approach as bunn.world — bypasses Safari autoplay) ── */
  (function() {
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var video = document.querySelector('.coins-vid');
    if (!video) return;

    if (isIOS) {
      /* Swap sources to .mov for iOS HEVC */
      video.querySelectorAll('source').forEach(function(s) { s.remove(); });
      var src = document.createElement('source');
      src.src = 'coins_mobile.mov';
      src.type = 'video/quicktime';
      video.appendChild(src);

      /* Create canvas sibling inside .wait-vid-wrap */
      var wrap = video.closest('.wait-vid-wrap');
      var canvasEl = document.createElement('canvas');
      canvasEl.className = 'coins-canvas';
      wrap.appendChild(canvasEl);

      /* Shrink native video out of sight, keep in DOM for playback engine */
      video.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;';

      var ctx = canvasEl.getContext('2d');
      var rafId = null;
      var vidW = 1920, vidH = 1080;

      function resizeCanvas() {
        var dpr = window.devicePixelRatio || 1;
        var cw = wrap.offsetWidth;
        var ch = wrap.offsetHeight;
        canvasEl.width  = Math.round(cw * dpr);
        canvasEl.height = Math.round(ch * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', function() { setTimeout(resizeCanvas, 200); });

      function drawLoop() {
        if (!video.paused && !video.ended) {
          var cw = wrap.offsetWidth, ch = wrap.offsetHeight;
          /* object-fit:cover + object-position:center bottom */
          var scale = Math.max(cw / vidW, ch / vidH);
          var dw = vidW * scale, dh = vidH * scale;
          var dx = (cw - dw) / 2, dy = ch - dh;
          ctx.clearRect(0, 0, cw, ch);
          ctx.drawImage(video, dx, dy, dw, dh);
        }
        rafId = requestAnimationFrame(drawLoop);
      }

      function startDrawing() { if (!rafId) rafId = requestAnimationFrame(drawLoop); }

      function startPlayback() {
        video.muted = true;
        video.play().then(startDrawing).catch(function() {
          ['touchstart', 'touchend', 'click'].forEach(function(evt) {
            document.addEventListener(evt, function handler() {
              video.muted = true;
              video.play().then(startDrawing);
              document.removeEventListener(evt, handler);
            }, { once: true, passive: true });
          });
        });
      }

      video.addEventListener('loadeddata', startPlayback);
      video.load();

      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && video.paused) { video.muted = true; video.play().then(startDrawing); }
      });

    } else {
      /* Non-iOS: native autoplay with fallback */
      video.defaultMuted = true;
      video.muted = true;
      video.play().catch(function() {
        document.addEventListener('touchstart', function handler() {
          video.play();
          document.removeEventListener('touchstart', handler);
        }, { once: true });
      });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && video.paused) { video.muted = true; video.play(); }
      });
    }
  })();

  render();
  window.addEventListener('resize', () => {
    if (digits.length) render();
    if (!s2.classList.contains('hidden')) updateWaitCardShape();
    if (!s3.classList.contains('hidden')) updateS3CardShape();
  });
</script>
</body>
</html>
